    <script type="module">
        import { Editor } from 'https://cdn.jsdelivr.net/npm/@tiptap/core@2.8.0/+esm';
        import StarterKit from 'https://cdn.jsdelivr.net/npm/@tiptap/starter-kit@2.8.0/+esm';
        import Placeholder from 'https://cdn.jsdelivr.net/npm/@tiptap/extension-placeholder@2.8.0/+esm';

        const el = document.getElementById('raw-input-editor');
        if (el) {
            window.bulkEditor = new Editor({
                element: el,
                extensions: [
                    StarterKit.configure({ codeBlock: false }),
                    Placeholder.configure({
                        placeholder: 'Type your questions here... Use [Q], [O1]–[O4], [E], [SUB], [TOP], [LEV], [ANS], [END].',
                        emptyEditorClass: 'is-empty-before',
                        emptyNodeClass: 'empty-node',
                        showOnlyCurrent: false,
                    }),
                ],
                content: '',
                editorProps: {
                    attributes: {
                        class: 'font-mono max-w-none min-h-full text-sm text-slate-300',
                    },
                },
            });
        }
    </script>
    <script>
        function parseBulkRawText(text) {
            const questions = [];
            const blocks = text.split(/\[Q\]/i);
            const levMap = { basic: 'easy', intermediate: 'medium', advanced: 'hard' };
            for (let i = 1; i < blocks.length; i++) {
                const block = blocks[i].trim();
                let stem = '', o1 = '', o2 = '', o3 = '', o4 = '';
                let ea = '', eb = '', ec = '', ed = '', generalE = '';
                let subject = '', topics = [], difficulty = 'medium';
                let correctLetter = 'A';
                const normalized = block.replace(/\[(O1|O2|O3|O4|01|02|03|04|E|EA|EB|EC|ED|SUB|TOP|LEV|ANS|END)\]/gi, '\n[$1]');
                const lines = normalized.split(/\r?\n/);
                let currentTag = 'Q';
                let currentContent = [];
                function flush() {
                    const s = currentContent.join('\n').trim();
                    if (currentTag === 'Q') stem = s;
                    else if (currentTag === 'O1') o1 = s;
                    else if (currentTag === 'O2') o2 = s;
                    else if (currentTag === 'O3') o3 = s;
                    else if (currentTag === 'O4') o4 = s;
                    else if (currentTag === 'E') generalE = s;
                    else if (currentTag === 'EA') ea = s;
                    else if (currentTag === 'EB') eb = s;
                    else if (currentTag === 'EC') ec = s;
                    else if (currentTag === 'ED') ed = s;
                    else if (currentTag === 'SUB') subject = s;
                    else if (currentTag === 'TOP') topics.push(s);
                    else if (currentTag === 'LEV') difficulty = levMap[s.toLowerCase()] || 'medium';
                    else if (currentTag === 'ANS') {
                        const c = (s || '').trim().charAt(0).toUpperCase();
                        if (['A', 'B', 'C', 'D'].includes(c)) correctLetter = c;
                    }
                    currentContent = [];
                }
                for (let j = 0; j < lines.length; j++) {
                    const line = lines[j];
                    const match = line.match(/^\[(O1|O2|O3|O4|01|02|03|04|E|EA|EB|EC|ED|SUB|TOP|LEV|ANS|END)\]\s*(.*)$/i);
                    if (match) {
                        flush();
                        let tag = (match[1] || '').toUpperCase();
                        if (tag === '01') tag = 'O1';
                        if (tag === '02') tag = 'O2';
                        if (tag === '03') tag = 'O3';
                        if (tag === '04') tag = 'O4';
                        if (tag === 'END') break;
                        currentTag = tag;
                        currentContent = [match[2]];
                    } else {
                        currentContent.push(line);
                    }
                }
                flush();
                stem = stem.trim();
                if (!stem) continue;
                const options = [
                    { letter: 'A', text: o1.trim(), explanation: (ea || generalE).trim() || null },
                    { letter: 'B', text: o2.trim(), explanation: (eb || generalE).trim() || null },
                    { letter: 'C', text: o3.trim(), explanation: (ec || generalE).trim() || null },
                    { letter: 'D', text: o4.trim(), explanation: (ed || generalE).trim() || null }
                ];
                const letters = ['A', 'B', 'C', 'D'];
                const correctIndex = Math.max(0, letters.indexOf(correctLetter));
                questions.push({
                    stem,
                    options,
                    correctIndex,
                    subject: subject.trim() || null,
                    topics,
                    difficulty
                });
            }
            return questions;
        }

        function getBulkEditorText() {
            const editor = window.bulkEditor;
            if (!editor) return '';
            const parts = [];
            function textFromNode(node) {
                let out = '';
                node.descendants((n) => {
                    if (n.isText) out += n.text;
                    else if (n.type.name === 'hardBreak') out += '\n';
                });
                return out;
            }
            function collectBlocks(node) {
                if (node.type.name === 'paragraph') {
                    parts.push(textFromNode(node));
                    return;
                }
                if (node.type.name === 'orderedList') {
                    let index = 1;
                    node.forEach((item) => {
                        if (item.type.name === 'listItem') {
                            parts.push(index + '. ' + textFromNode(item).replace(/^\s+|\s+$/g, ''));
                            index += 1;
                        }
                    });
                    return;
                }
                if (node.type.name === 'bulletList') {
                    node.forEach((item) => {
                        if (item.type.name === 'listItem') {
                            parts.push('- ' + textFromNode(item).replace(/^\s+|\s+$/g, ''));
                        }
                    });
                    return;
                }
                node.forEach(collectBlocks);
            }
            editor.state.doc.forEach(collectBlocks);
            return parts.join('\n');
        }

        function showBulkImportMessage(msg, isError) {
            const el = document.getElementById('bulk-import-message');
            if (!el) return;
            el.textContent = msg;
            el.className = 'px-3 py-2 text-xs ' + (isError ? 'text-red-400' : 'text-primary');
            el.classList.remove('hidden');
        }

        async function saveBulkQuestions() {
            const raw = getBulkEditorText();
            const questions = parseBulkRawText(raw);
            if (!questions.length) { showBulkImportMessage('No valid questions found. Use [Q] ... [END] format.', true); return; }
            if (!window.supabase) { showBulkImportMessage('Supabase not configured. Add js/config.js.', true); return; }
            const btn = document.getElementById('bulk-import-btn');
            if (btn) btn.disabled = true;
            let ok = 0, fail = 0;
            const failures = [];
            try {
                showBulkImportMessage('Importing ' + questions.length + ' question(s)...');

                // Read current max index and continue numbering from there (1-based)
                let nextIndexBase = 1;
                const { data: maxRow, error: maxErr } = await window.supabase
                    .from('questions')
                    .select('index')
                    .order('index', { ascending: false })
                    .limit(1)
                    .maybeSingle();
                if (!maxErr && maxRow && maxRow.index != null) {
                    nextIndexBase = maxRow.index + 1;
                } else if (maxErr) {
                    console.error('[Bulk import] FAILED: select max index', maxErr);
                    failures.push({ step: 'read-max-index', message: maxErr.message || String(maxErr) });
                }

                for (let i = 0; i < questions.length; i++) {
                    const q = questions[i];
                    const qIndex = nextIndexBase + i;

                    const { data: row, error: qErr } = await window.supabase.from('questions').insert({
                        stem: q.stem,
                        difficulty: q.difficulty,
                        subject: q.subject,
                        topics: q.topics && q.topics.length ? q.topics : null,
                        index: qIndex
                    }).select('id').single();

                    if (qErr) {
                        console.error('[Bulk import] FAILED: questions insert', qErr);
                        fail++;
                        failures.push({
                            step: 'insert-question',
                            question: (q.stem || '').slice(0, 120),
                            message: qErr.message || JSON.stringify(qErr)
                        });
                        continue;
                    }

                    const opts = q.options.map((o, idx) => ({
                        question_id: row.id,
                        option_letter: o.letter,
                        option_text: o.text || '(No text)',
                        explanation: o.explanation || null,
                        is_correct: idx === q.correctIndex
                    }));
                    const { error: oErr } = await window.supabase.from('options').insert(opts);
                    if (oErr) {
                        console.error('[Bulk import] FAILED: options insert', oErr);
                        fail++;
                        failures.push({
                            step: 'insert-options',
                            question: (q.stem || '').slice(0, 120),
                            message: oErr.message || JSON.stringify(oErr)
                        });
                    } else {
                        ok++;
                    }
                }
            } catch (e) {
                console.error('Bulk import crashed', e);
                failures.push({ step: 'exception', message: (e && (e.message || String(e))) || 'Unknown error' });
            } finally {
                if (btn) btn.disabled = false;
            }

            if (failures.length) {
                const first = failures[0];
                const detail = (first.step ? first.step + ': ' : '') + (first.message || 'Unknown error');
                const summary = ok + ' imported, ' + fail + ' failed. First error: ' + detail;
                showBulkImportMessage(summary, fail > 0);
                console.error('[Bulk import] First failure step:', first.step, '| message:', first.message);
            } else {
                showBulkImportMessage(ok + ' imported, ' + fail + ' failed.', fail > 0);
            }

            if (ok > 0 && window.bulkEditor) {
                window.bulkEditor.commands.setContent('');
            }
        }

        function insertTag(tag) {
            const editor = window.bulkEditor;
            if (!editor) return;
            const { from } = editor.state.selection;
            const $pos = editor.state.doc.resolve(from);
            const atLineStart = $pos.parentOffset === 0;
            const textToInsert = (atLineStart ? '' : '\n') + tag + ' ';
            editor.chain().focus().insertContentAt(from, textToInsert).run();
        }

        function insertMarkdown(wrapBefore, wrapAfter, placeholder) {
            const editor = window.bulkEditor;
            if (!editor) return;
            const { from, to } = editor.state.selection;
            const selected = editor.state.doc.textBetween(from, to, '');
            const text = selected || (placeholder || '');
            const insert = wrapBefore + text + wrapAfter;
            const chain = editor.chain().focus();
            if (to > from) chain.deleteRange({ from, to });
            chain.insertContentAt(from, insert).run();
        }

        function insertMarkdownLinePrefix(prefix) {
            const editor = window.bulkEditor;
            if (!editor) return;
            const { from } = editor.state.selection;
            const $pos = editor.state.doc.resolve(from);
            const lineStart = from - $pos.parentOffset;
            editor.chain().focus().insertContentAt(lineStart, prefix).run();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function pasteAsPlainText() {
            const editor = window.bulkEditor;
            if (!editor) return;
            try {
                const plain = navigator.clipboard && await navigator.clipboard.readText();
                if (!plain || !plain.trim()) return;
                const lines = plain.split(/\r?\n/);
                const html = lines.map((line) => '<p>' + escapeHtml(line) + '</p>').join('');
                editor.chain().focus().deleteSelection().insertContent(html).run();
            } catch (e) {
                console.warn('Paste as plain text failed:', e);
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const icon = document.getElementById('dark-mode-icon');
            if (icon) {
                icon.textContent = isDark ? 'light_mode' : 'dark_mode';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark');
            const icon = document.getElementById('dark-mode-icon');
            if (icon) icon.textContent = isDark ? 'light_mode' : 'dark_mode';
            const bulkImportBtn = document.getElementById('bulk-import-btn');
            if (bulkImportBtn) bulkImportBtn.addEventListener('click', saveBulkQuestions);
            const bulkSubmitBtn = document.getElementById('bulk-submit-btn');
            if (bulkSubmitBtn) bulkSubmitBtn.addEventListener('click', saveBulkQuestions);

            const bulkEditorHost = document.getElementById('raw-input-editor');
            if (bulkEditorHost) {
                bulkEditorHost.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                        e.preventDefault();
                        saveBulkQuestions();
                    }
                });
            }

            const loadFileBtn = document.getElementById('bulk-load-file-btn');
            if (loadFileBtn) loadFileBtn.addEventListener('click', loadBulkImportFile);
        });

        async function loadBulkImportFile() {
            const editor = window.bulkEditor;
            if (!editor) return;
            try {
                const res = await fetch('question-bank-import.txt');
                if (!res.ok) throw new Error('File not found');
                const text = await res.text();
                const lines = text.split(/\r?\n/);
                const html = lines.map((line) => '<p>' + escapeHtml(line) + '</p>').join('');
                editor.commands.setContent(html);
                const msg = document.getElementById('bulk-import-message');
                if (msg) { msg.textContent = 'Loaded question-bank-import.txt'; msg.className = 'px-3 py-2 text-xs text-primary'; msg.classList.remove('hidden'); }
            } catch (e) {
                const msg = document.getElementById('bulk-import-message');
                if (msg) { msg.textContent = 'Could not load file: ' + (e.message || 'Unknown error'); msg.className = 'px-3 py-2 text-xs text-red-400'; msg.classList.remove('hidden'); }
            }
        }
    </script>
</body>
